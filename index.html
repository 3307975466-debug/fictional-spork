<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字孪生校园交互系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            background: #1a1a2e;
        }
        #container { width: 100vw; height: 100vh; display: block; }
        #info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 300px;
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 20px;
            border-radius: 10px;
            display: none;
            z-index: 100;
            border: 1px solid #4CAF50;
        }
        #info-panel h3 { margin-bottom: 10px; color: #4CAF50; font-size: 20px; }
        #info-panel p { margin: 8px 0; font-size: 14px; line-height: 1.4; }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
        }
        .ctrl-btn {
            padding: 12px 24px;
            background: rgba(0,0,0,0.8);
            color: white;
            border: 2px solid #4CAF50;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .ctrl-btn:hover { background: #4CAF50; }
        .ctrl-btn.active { background: #4CAF50; }
        #title {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-shadow: 2px 2px 8px rgba(0,0,0,1);
            z-index: 100;
        }
        #title h1 { font-size: 28px; margin-bottom: 5px; }
        #title p { font-size: 14px; opacity: 0.9; }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #4CAF50;
            font-size: 24px;
            z-index: 200;
        }
        #layers {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
        }
        .layer-btn {
            padding: 8px 16px;
            background: rgba(0,0,0,0.8);
            color: white;
            border: 1px solid #888;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
        }
        .layer-btn.active { border-color: #4CAF50; background: rgba(76,175,80,0.3); }
        .info-close {
            margin-top: 15px;
            width: 100%;
            padding: 8px;
            background: #4CAF50;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <canvas id="container"></canvas>
    <div id="loading">加载中...</div>

    <div id="title">
        <h1>数字孪生校园交互系统</h1>
        <p>浙江树人学院 | 计算机图形学期中考核</p>
    </div>

    <div id="layers">
        <button class="layer-btn active" data-layer="buildings">建筑</button>
        <button class="layer-btn active" data-layer="roads">道路</button>
        <button class="layer-btn active" data-layer="vegetation">植被</button>
    </div>

    <div id="controls">
        <button class="ctrl-btn active" id="btn-perspective">透视视角</button>
        <button class="ctrl-btn" id="btn-bird">鸟瞰视角</button>
        <button class="ctrl-btn" id="btn-reset">重置视角</button>
        <button class="ctrl-btn" id="btn-animation">旋转动画</button>
    </div>

    <div id="info-panel">
        <h3 id="building-name">建筑名称</h3>
        <p><strong>功能:</strong> <span id="building-function">-</span></p>
        <p><strong>楼层:</strong> <span id="building-floors">-</span></p>
        <p><strong>简介:</strong> <span id="building-desc">-</span></p>
        <button class="info-close" id="close-btn">关闭</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        // 确保 THREE 全局可用后再加载主脚本
        window.addEventListener('DOMContentLoaded', function() {
            if (typeof THREE === 'undefined') {
                document.getElementById('loading').textContent = 'Three.js 加载失败，请刷新页面';
            }
        });
    </script>
    <script src="main.js"></script>
</body>
</html>
